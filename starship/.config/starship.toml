# --- General Config ---
add_newline = true

# Single-line minimalist prompt
format = """
\\[$username@$hostname $directory\\] \
$git_branch\
$git_status\
$cmd_duration
$character"""

[username]
show_always = true
style_user = "white"
style_root = "red"
format = "[$user]($style)"

[hostname]
ssh_only = false
style = "white"
format = "[$hostname]($style)"

[directory]
style = "bold green"
truncation_length = 3
truncation_symbol = "…/"
read_only = " 󰌾"

[character]
success_symbol = "[>](bold white) " 
error_symbol = "[>](bold red) "

[git_branch]
symbol = " "
format = "on [$symbol$branch]($style) "
style = "#F1502F"

[git_status]
format = "([$all_status$ahead_behind]($style) )"
style = "bold red"

# --- Módulo de Tiempo ---
# Te dice cuánto tardó el último comando si fue > 1s
[cmd_duration]
min_time = 1_000 # milisegundos
format = "took [$duration]($style) "
style = "bold white"

# --- Módulo de Memoria ---
[memory_usage]
disabled = false
threshold = 85
style = "bold dimmed white"
format = "mem [$ram]($style) "

# --- Sudo detection ---
[sudo]
disabled = false
symbol = "󰌆 "
format = "[$symbol]($style)"
style = "bold italic yellow"